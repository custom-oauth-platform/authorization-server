spring.application.name=authorization-server

# ==============================
# MySQL DataSource
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/oauth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Server Port
# ==============================
server.port=9000

# ?? ??? ?? ???? ??
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://127.0.0.1:9000