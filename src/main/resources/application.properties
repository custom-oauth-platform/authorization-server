spring.application.name=authorization-server

# ==============================
# MySQL DataSource
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/oauth_authorization_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.datasource.profile.url=jdbc:mysql://localhost:3306/oauth_resource_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
app.datasource.profile.username=root
app.datasource.profile.password=1234
app.datasource.profile.driver-class-name=com.mysql.cj.jdbc.Driver

app.oauth.client-id=oauth2-client-app
app.oauth.client-secret=secret
app.oauth.redirect-uri=http://localhost:3000/api/auth/callback/custom-oauth
app.oauth.post-logout-redirect-uri=http://localhost:3000
app.oauth.issuer=http://localhost:9000
app.oauth.access-token-ttl-minutes=30
app.oauth.refresh-token-ttl-days=15

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Server Port
# ==============================
server.port=9000

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000
