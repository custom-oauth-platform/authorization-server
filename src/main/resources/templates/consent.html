<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Consent required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 520px;
            margin: 60px auto;
            padding: 24px;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        h2 { margin-bottom: 8px; }
        .desc { color: #666; margin-bottom: 24px; }
        .scope-box {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .approve { background: #111; color: white; }
        .cancel { background: #ddd; color: black; }
    </style>
</head>
<body>
<h2>Consent required</h2>

<p class="desc">
    <strong th:text="${clientName}">Client App</strong>
    가 아래 권한을 요청합니다.
</p>

<form method="post" action="/oauth2/authorize">
    <input type="hidden" name="client_id" th:value="${clientId}" />
    <input type="hidden" name="state" th:value="${state}" />

    <div class="scope-box" th:each="item : ${scopes}">
        <label>
            <input type="checkbox" name="scope" th:value="${item.scope}" checked />
            <strong th:text="${item.scope}">scope</strong>
        </label>
        <p th:text="${item.description}">scope description</p>
    </div>

    <div class="actions">
        <button type="submit" class="approve">Submit Consent</button>
        <button type="button" class="cancel" onclick="history.back()">Cancel</button>
    </div>
</form>
</body>
</html>
